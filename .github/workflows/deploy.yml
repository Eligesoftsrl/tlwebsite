name: Build & Deploy with Pre-rendering

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk-bridge2.0-0 libx11-xcb1 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2t64 libpangocairo-1.0-0 libgtk-3-0

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build with pre-rendering
        working-directory: frontend
        env:
          GENERATE_SOURCEMAP: 'false'
          CI: 'false'
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable
        run: yarn build:prerender

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy pre-built site to Vercel
        working-directory: frontend/build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prod --token=$VERCEL_TOKEN --yes
